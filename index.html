<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BFS218: the course reading room</title>
<meta name="description" content="The reading room for BFS218 at Seneca Polytechnic. Search, compare, and follow how the course's readings connect. A companion to Blackboard.">
<link rel="stylesheet" href="./fonts/fonts.css">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<style>
  :root{
    --navy:#1B2A4A; --red:#DA291C; --red-dark:#961A13; --amber:#F2A900; --page:#F7F8FA; --surface:#fff;
    --surface-alt:#FBFCFD; --soft:#EEF1F5; --border:#DEE3EA; --border-hover:#C9D1DC;

    --sans:'IBM Plex Sans',ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{font-family:var(--sans);background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  ::selection{background:#FCEFD2}

  .skip{position:absolute;left:-999px;top:0;background:var(--ink);color:#fff;padding:10px 16px;z-index:200;border-radius:0 0 8px 0}

  .vh{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
  .soc-weekstrip{display:none}
  .soc-mobile-menu{display:none!important}
  .soc-mobile-scrim{display:none}
  .soc-mobile-jump{display:none}
  @keyframes riseUp{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .rise{animation:riseUp .26s ease both}
  .scrollarea::-webkit-scrollbar{width:10px;height:10px}

  .hshelf::-webkit-scrollbar{height:9px}
  .hshelf::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  /* hover states (prototype used a custom style-hover; here as classes) */
  .card{transition:box-shadow .15s ease,border-color .15s ease}
  .card:hover{box-shadow:0 6px 18px rgba(27,42,74,.12);border-color:var(--border-hover)}
  .idxrow:hover{background:var(--surface-alt)}
  .relrow{transition:box-shadow .15s ease,border-color .15s ease}
  .relrow:hover{border-color:var(--border-hover);box-shadow:0 3px 10px rgba(27,42,74,.08)}
  .flip{perspective:1200px;height:248px;border:none;background:none;padding:0;display:block;width:100%;text-align:left;cursor:pointer}
  .flip-inner{position:relative;display:block;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);border-radius:14px;padding:17px 18px;overflow:auto;box-shadow:0 1px 2px rgba(21,23,28,.04)}
  .flip-front{background:#fff}
  .flip-back{background:#1B2A4A;color:#fff;transform:rotateY(180deg)}
  .flip:hover .flip-front{border-color:var(--border-hover);box-shadow:0 6px 18px rgba(27,42,74,.12)}
  @media (prefers-reduced-motion:reduce){.flip-inner{transition:none}}
  .mapsrc:hover{background:var(--page)}
  .addtile:hover{border-color:var(--navy)!important;color:var(--navy)!important}
  .pickchip:hover{border-color:var(--navy)!important}
  .removebtn:hover{color:var(--red)!important}
  .jhero{position:relative;overflow:hidden;border-radius:16px;color:var(--ink);padding:40px 42px 38px;background:#fff;border:1px solid var(--border);border-top:4px solid var(--red);box-shadow:0 1px 2px rgba(21,23,28,.04)}
  .jhero-art{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .jhero-cta{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:11px;padding:13px 22px;font-size:1rem;font-weight:600;box-shadow:0 8px 22px rgba(218,41,28,.32);transition:transform .15s ease,box-shadow .15s ease}
  .jhero-cta:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(218,41,28,.44)}
  .jstation{position:relative;display:block;width:100%;text-align:left;border:1px solid var(--border);background:#fff;border-radius:14px;padding:16px 18px;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
  .jstation:hover{transform:translateX(3px);box-shadow:0 8px 22px rgba(27,42,74,.13);border-color:var(--border-hover)}
  .jstation.cur{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
  .jdot{transition:transform .16s ease}
  .jstation:hover .jdot{transform:scale(1.07)}
  .jtile{display:flex;flex-direction:column;gap:8px;border:1px solid var(--border);background:#fff;border-radius:16px;padding:20px;text-align:left;cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}

  @keyframes heroFloat{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:760px){ .jhero{padding:34px 22px 30px} }
  .bfs-face{width:14px;height:14px;border-radius:50%;background:#CBD2DB;display:inline-block}
  .bfs-face.fail{background:#DA291C;animation:bfsFail .45s ease both}
  @keyframes bfsFail{from{transform:scale(.3);opacity:.25}to{transform:scale(1);opacity:1}}

  .wk-gq{display:flex;gap:9px;align-items:flex-start;margin:8px 0;font-size:.94rem;color:var(--ink-dim)}.wk-gq .q{color:var(--red);font-weight:800}

  .wk-cite{font-size:.8rem;color:var(--ink-faint);font-style:italic}
  .wk-term{margin:12px 0;color:var(--ink-dim);line-height:1.55}.wk-term b{color:var(--ink)}

  .wk-scope{display:inline-block;margin-top:9px;font-size:.74rem;color:var(--ink-dim);background:var(--soft);border:none;border-radius:6px;padding:4px 10px;cursor:pointer}
  .wk-visual{margin:0}.wk-visual img{display:block;width:100%;height:auto;border:1px solid var(--border);border-radius:12px;background:#15171C}.wk-visual figcaption{margin-top:9px;font-size:.82rem;line-height:1.5;color:var(--ink-faint)}
  .wk-visual-frames{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin-top:10px}.wk-visual-frames span{min-width:0;border:1px solid var(--border);border-radius:8px;background:var(--soft);padding:7px 6px;text-align:center;font-size:.68rem;font-weight:700;color:var(--ink-dim)}
  .wk-visual-pilot .wk-visual img{background:#fff}.wk-visual-explain{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.wk-visual-card{border:1px solid var(--border);border-radius:10px;background:#FBFCFD;padding:12px 13px}.wk-visual-card .mono{font-size:.64rem;letter-spacing:.06em;color:var(--red);font-weight:700;margin-bottom:5px}.wk-visual-card h3{font-size:.94rem;margin:0 0 5px;color:var(--ink)}.wk-visual-card p{font-size:.82rem;line-height:1.5;color:var(--ink-dim);margin:0}
  @media(max-width:760px){.wk-visual-frames{grid-template-columns:repeat(2,minmax(0,1fr))}.wk-visual-frames span:last-child{grid-column:1/-1}}
  @media(max-width:760px){.wk-visual-explain{grid-template-columns:1fr}}
  .wk-model-shell{position:relative;min-height:360px;border:1px solid rgba(27,42,74,.16);border-radius:15px;overflow:hidden;background:linear-gradient(180deg,#F9FBFC 0%,#E3ECF1 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
  .wk-model-canvas{display:block;width:100%;height:100%;min-height:360px;touch-action:none}
  .wk-model-note{position:absolute;left:14px;top:14px;max-width:min(390px,calc(100% - 28px));background:rgba(255,255,255,.9);border:1px solid rgba(27,42,74,.13);border-radius:11px;padding:10px 12px;box-shadow:0 8px 18px rgba(27,42,74,.1);backdrop-filter:blur(5px)}
  .wk-model-note b{display:block;font-size:.78rem;color:var(--ink);margin-bottom:3px}.wk-model-note span{display:block;font-size:.74rem;line-height:1.4;color:var(--ink-dim)}
  .wk-model-labels{position:absolute;inset:0;pointer-events:none}.wk-label-leaders{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:8}.wk-label-line{stroke:rgba(27,42,74,.46);stroke-width:1.4;stroke-dasharray:4 4}.wk-label-anchor{fill:var(--red);stroke:#fff;stroke-width:2.2;filter:drop-shadow(0 2px 3px rgba(27,42,74,.2))}.wk-model-label{position:absolute;transform:translate(-50%,-50%);max-width:190px;background:rgba(255,255,255,.95);border:1px solid rgba(27,42,74,.16);border-radius:10px;padding:7px 9px;box-shadow:0 8px 18px rgba(27,42,74,.11);backdrop-filter:blur(4px)}.wk-model-label b{display:block;font-size:.7rem;line-height:1.15;color:var(--red);margin:0 0 2px}.wk-model-label small{display:block;font-size:.68rem;line-height:1.25;color:var(--ink)}
  .wk-model-controls{position:absolute;left:14px;right:14px;bottom:14px;display:flex;gap:8px;flex-wrap:wrap}.wk-model-controls button{border:1px solid rgba(27,42,74,.2);background:rgba(255,255,255,.92);color:var(--ink);border-radius:9px;padding:7px 10px;font-size:.75rem;font-weight:700;box-shadow:0 6px 14px rgba(27,42,74,.1)}.wk-model-controls button.on{border-color:var(--red);background:#FBF4F3;color:var(--red)}
  .wk-model-fallback{position:absolute;right:14px;top:14px;max-width:280px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.78rem;line-height:1.4;color:var(--ink-dim)}
  .wk-model-guide{border:1px solid var(--border);border-left:4px solid var(--red);border-radius:12px;background:#fff;padding:13px 15px;margin:0 0 12px}.wk-model-guide b{display:block;font-size:.86rem;color:var(--ink);margin-bottom:5px}.wk-model-guide p{font-size:.85rem;line-height:1.55;color:var(--ink-dim);margin:0 0 9px}.wk-model-guide ol{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin:0;padding:0;list-style:none}.wk-model-guide li{border:1px solid var(--border);border-radius:9px;background:#FBFCFD;padding:9px 10px;font-size:.8rem;line-height:1.4}.wk-model-guide strong{display:block;color:var(--red);font-size:.75rem;margin:0 0 3px}.wk-model-guide span{display:block;color:var(--ink-dim)}
  .wk-path{background:linear-gradient(135deg,#fff 0%,#F7FAFB 100%);border-left:4px solid var(--red)}.wk-path-kicker{font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--red);font-weight:800;margin:0 0 6px}.wk-path h2{font-size:1.12rem;line-height:1.25;color:var(--ink);margin:0 0 7px}.wk-path>p{font-size:.92rem;line-height:1.58;color:var(--ink-dim);margin:0 0 13px}.wk-path-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.wk-path-card{position:relative;border:1px solid var(--border);border-radius:10px;background:#fff;padding:11px 11px 12px;min-height:118px}.wk-path-card span{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;font-size:.72rem;font-weight:800;margin:0 0 9px}.wk-path-card b{display:block;font-size:.86rem;color:var(--ink);line-height:1.25;margin:0 0 5px}.wk-path-card p{font-size:.78rem;line-height:1.42;color:var(--ink-dim);margin:0}.wk-done{border:1px solid #B9D6C2;background:#F2F8F4;border-radius:10px;padding:11px 13px;margin:12px 0 0}.wk-done b{display:block;font-size:.82rem;color:#155f34;margin:0 0 5px}.wk-done ul{margin:0;padding-left:18px}.wk-done li{font-size:.8rem;line-height:1.45;color:var(--ink-dim);margin:3px 0}
  .activity-path{display:grid;grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);gap:12px;align-items:stretch;border:1px solid var(--border);border-left:4px solid var(--red);border-radius:12px;background:#fff;padding:14px 16px;margin:0 0 16px}.activity-path b{display:block;font-size:.92rem;color:var(--ink);margin:0 0 5px}.activity-path p{font-size:.84rem;line-height:1.52;color:var(--ink-dim);margin:0}.activity-path ol{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;list-style:none;margin:0;padding:0}.activity-path li{border:1px solid var(--border);border-radius:9px;background:#FBFCFD;padding:9px 10px;font-size:.82rem;line-height:1.4;color:var(--ink-dim);font-weight:600}.activity-path li span{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;background:var(--red);color:#fff;font-size:.68rem;font-weight:800;margin:0 7px 0 0}
  .wk-rescue{border-left:4px solid #1B2A4A;background:#fff}.wk-rescue-head .mono,.asg-page .mono,.vid-page .mono{font-size:.68rem;letter-spacing:.08em;color:var(--red);font-weight:800}.wk-rescue h2{font-size:1.16rem;margin:4px 0 6px;color:var(--ink)}.wk-rescue p{font-size:.9rem;line-height:1.55;color:var(--ink-dim);margin:0}.wk-rescue-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:13px}.wk-rescue-grid>div{border:1px solid var(--border);border-radius:10px;background:#FBFCFD;padding:12px}.wk-rescue-grid b{display:block;font-size:.82rem;color:#1B2A4A;margin-bottom:5px}.wk-rescue-grid span{display:block;font-size:.84rem;line-height:1.42;color:var(--ink)}.wk-rescue-grid small{display:block;font-size:.75rem;line-height:1.4;color:var(--ink-dim);margin-top:6px}.wk-rescue-open{margin-top:10px;border:1px solid var(--border);background:#fff;color:var(--red);border-radius:8px;padding:7px 10px;font-size:.78rem;font-weight:800}.wk-rescue-foot{display:flex;gap:7px;align-items:flex-start;border:1px solid #D6E2EA;background:#F0F5F8;border-radius:10px;padding:10px 12px;margin-top:10px}.wk-rescue-foot b{font-size:.82rem;color:#1B2A4A;white-space:nowrap}.wk-rescue-foot span{font-size:.8rem;line-height:1.45;color:var(--ink-dim)}
